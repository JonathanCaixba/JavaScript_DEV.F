<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="stylesgen.css" />
  <title>Password Generator Neon Red</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'JetBrains Mono', monospace;
    }

    body{
      background:#070707;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
    }

    /* Fondo partículas */
    #particles-js{
      position:fixed;
      width:100%;
      height:100%;
      top:0;
      left:0;
      z-index:-1;
    }

    .container{
      width:380px;
      background:rgba(15,0,0,0.9);
      border:1px solid #ff003c;
      padding:25px;
      border-radius:12px;
      box-shadow:
        0 0 10px #ff003c,
        0 0 25px #8b0000,
        0 0 45px rgba(255,0,60,.5);
      backdrop-filter:blur(8px);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#ff335f;
      text-shadow:0 0 10px #ff003c;
      font-size:22px;
    }

    .password-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:#120202;
      border:1px solid #ff003c;
      padding:15px;
      border-radius:8px;
      margin-bottom:25px;
    }

    .password-box input{
      width:100%;
      background:none;
      border:none;
      color:white;
      font-size:24px;
      outline:none;
    }

    .copy-btn{
      cursor:pointer;
      color:#ff335f;
      font-size:22px;
      transition:.3s;
    }

    .copy-btn:hover{
      transform:scale(1.2);
      color:#fff;
      text-shadow:0 0 10px #ff003c;
    }

    .range-container{
      margin-bottom:20px;
    }

    .range-title{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
      color:#ff5577;
    }

    input[type="range"]{
      width:100%;
      accent-color:#ff003c;
    }

    .options{
      margin:20px 0;
    }

    .option{
      margin:12px 0;
      display:flex;
      align-items:center;
      gap:10px;
      color:#ddd;
    }

    input[type="checkbox"]{
      accent-color:#ff003c;
      width:18px;
      height:18px;
    }

    .strength-box{
      margin-top:25px;
      background:#120202;
      border:1px solid #ff003c;
      padding:15px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .bars{
      display:flex;
      gap:5px;
    }

    .bar{
      width:10px;
      height:25px;
      border:1px solid #ff335f;
      background:transparent;
    }

    .active{
      background:#ff003c;
      box-shadow:0 0 10px #ff003c;
    }

    .generate-btn{
      width:100%;
      margin-top:25px;
      padding:15px;
      border:none;
      border-radius:8px;
      background:#ff003c;
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
      box-shadow:0 0 15px #ff003c;
    }

    .generate-btn:hover{
      background:#ff335f;
      transform:translateY(-2px);
      box-shadow:0 0 25px #ff003c;
    }
  </style>
</head>
<body>

  <!-- Partículas -->
  <div id="particles-js"></div>

  <div class="container">
    <h1>Password Generator</h1>

    <div class="password-box">
      <input type="text" id="password" readonly>
      <span class="copy-btn" id="copyBtn">📋</span>
    </div>

    <div class="range-container">
      <div class="range-title">
        <span>Character Length</span>
        <span id="lengthValue">10</span>
      </div>

      <input type="range" min="8" max="30" value="10" id="lengthRange">
    </div>

    <div class="options">
      <div class="option">
        <input type="checkbox" id="uppercase" checked>
        <label>Include Uppercase Letters</label>
      </div>

      <div class="option">
        <input type="checkbox" id="lowercase" checked>
        <label>Include Lowercase Letters</label>
      </div>

      <div class="option">
        <input type="checkbox" id="numbers" checked>
        <label>Include Numbers</label>
      </div>

      <div class="option">
        <input type="checkbox" id="symbols">
        <label>Include Symbols</label>
      </div>
    </div>

    <div class="strength-box">
      <span id="strengthText">MEDIUM</span>

      <div class="bars">
        <div class="bar active"></div>
        <div class="bar active"></div>
        <div class="bar active"></div>
        <div class="bar"></div>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn">
      GENERATE →
    </button>
  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const lengthRange = document.getElementById("lengthRange");
    const lengthValue = document.getElementById("lengthValue");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");

    const uppercase = document.getElementById("uppercase");
    const lowercase = document.getElementById("lowercase");
    const numbers = document.getElementById("numbers");
    const symbols = document.getElementById("symbols");

    const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lowerChars = "abcdefghijklmnopqrstuvwxyz";
    const numberChars = "0123456789";
    const symbolChars = "!@#$%^&*()_+[]{}<>?/";

    lengthRange.addEventListener("input", () => {
      lengthValue.textContent = lengthRange.value;
    });

    function generatePassword() {
      let chars = "";

      if (uppercase.checked) chars += upperChars;
      if (lowercase.checked) chars += lowerChars;
      if (numbers.checked) chars += numberChars;
      if (symbols.checked) chars += symbolChars;

      if (chars === "") {
        alert("Selecciona al menos una opción");
        return;
      }

      let password = "";

      for (let i = 0; i < lengthRange.value; i++) {
        password += chars.charAt(
          Math.floor(Math.random() * chars.length)
        );
      }

      passwordInput.value = password;
    }

    generateBtn.addEventListener("click", generatePassword);

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(passwordInput.value);
      copyBtn.textContent = "✅";

      setTimeout(() => {
        copyBtn.textContent = "📋";
      }, 1500);
    });

    // Password inicial
    generatePassword();

    // Partículas
    tsParticles.load("particles-js", {
      background: {
        color: "#070707"
      },
      particles: {
        number: {
          value: 80
        },
        color: {
          value: "#ff003c"
        },
        links: {
          enable: true,
          color: "#8b0000",
          distance: 150
        },
        move: {
          enable: true,
          speed: 1
        },
        size: {
          value: 2
        },
        opacity: {
          value: 0.5
        }
      }
    });
  </script>

</body>
</html>
